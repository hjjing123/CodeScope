<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f4f4f4;
            color: #333;
            line-height: 1.6;
            font-size: 12px; /* 减小默认字体大小 */
            padding: 5px;
            margin: 0;

        }
        header {
            background: #fff;
            padding: 0px 0;
            text-align: center;
        }
        h1 {
            color: black;
<!--            font-size: 2.5em;-->
                font-size: 1.8em; /* 减小字体大小 */
            border-bottom: 2px solid #800080; /* 改为紫色 */
            padding-bottom: 10px;
            margin-bottom: 20px;
        }
        h2 {
            color: black;
<!--            font-size: 2.0em;-->
                font-size: 1.5em; /* 减小字体大小 */
            border-bottom: 2px solid #800080; /* 改为紫色 */

        }
        h3 {
            color: black;
<!--            font-size: 1.75em;-->
    font-size: 1.3em; /* 减小字体大小 */
            border-bottom: 2px solid #800080; /* 改为紫色 */
        }
        h4 {
            color: black;
<!--            font-size: 1.5em;-->
            font-size: 12px; /* 减小字体大小 */
            border-bottom: 2px solid #800080; /* 改为紫色 */
        }
        h5 {
            color: black;
<!--            font-size: 1.25em;-->
            font-size: 12px; /* 减小字体大小 */
            border-bottom: 1px solid #800080; /* 改为紫色 */

        }
        h6 {
            color: black;
<!--            font-size: 1em;-->
            border-bottom: 2px solid #800080; /* 改为紫色 */
    font-size: 1em; /* 减小字体大小 */
        }
        ul {
            color: #333;
            list-style-type: disc;
            margin-left: 20px; /* 减小缩进 */
        }
        ul li {
            color: #333;
        }
        ol {
            color: #333;
            list-style-type: decimal;
            margin-left: 20px; /* 减小缩进 */
        }
        ol li {
            color: #333;
        }
        p {
            margin: 10px 0;
<!--            font-size: 14px; /* 设置 p 标签的字体大小 */-->
                font-size: 12px; /* 设置 p 标签的字体大小 */
        }
        .container {
            background: #fff;
            padding: 5px;
            max-width: 800px;
            margin: 5px auto;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .green-accent {
            color: #4CAF50;
        }
    </style>
</head>
<body>
<div class="container">
    ${content}
</div>
</body>
</html>
